<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini IDE</title>
<style>
  body {
    margin: 0;
    font-family: monospace;
    background: #1e1e1e;
    color: #ddd;
  }

  .container {
    display: flex;
    height: 100vh;
  }

  textarea {
    width: 50%;
    height: 100%;
    background: #1e1e1e;
    color: transparent;
    caret-color: white;
    border: none;
    outline: none;
    padding: 10px;
    resize: none;
    position: absolute;
    z-index: 2;
  }

  .editor-wrapper {
    width: 50%;
    position: relative;
  }

  .highlight {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 10px;
    white-space: pre-wrap;
    pointer-events: none;
    z-index: 1;
  }

  .error-line {
    background: rgba(255, 0, 0, 0.25);
  }

  .keyword { color: #4fc1ff; }
  .arrow { color: #c586c0; }
  .number { color: #b5cea8; }
  .invalid { color: #f44747; }

  .output {
    width: 50%;
    padding: 10px;
    background: #252526;
    overflow-y: auto;
  }

  .error {
    color: #f44747;
  }
</style>
</head>
<body>

<div class="container">
  <div class="editor-wrapper">
    <textarea id="editor" spellcheck="false"></textarea>
    <pre id="highlight" class="highlight"></pre>
  </div>
  <div class="output">
    <div id="output"></div>
  </div>
</div>

<script>
const editor = document.getElementById("editor");
const highlight = document.getElementById("highlight");
const output = document.getElementById("output");

let variables = {};

function tokenize(line) {
  return line.trim().split(/\s+/);
}

function syntaxHighlight(code, errorLines) {
  const lines = code.split("\n");
  return lines.map((line, i) => {
    let html = line;

    html = html.replace(/(>-=?|>->|>>>\.\.\.)/g, '<span class="keyword">$1</span>');
    html = html.replace(/(>->)/g, '<span class="arrow">$1</span>');

    if (errorLines.includes(i)) {
      return `<div class="error-line">${html}</div>`;
    }

    return `<div>${html}</div>`;
  }).join("\n");
}

function run(code) {
  const lines = code.split("\n");
  let errorLines = [];
  let out = "";

  lines.forEach((line, i) => {
    const tokens = tokenize(line);

    if (tokens.length === 0) return;

    const token = tokens[0];

    // assignment
    if (/^>+-$/.test(token)) {
      const varName = "var" + Object.keys(variables).length;
      variables[varName] = 3;
      return;
    }

    // print
    if (token === ">->") {
      const keys = Object.keys(variables);
      if (keys.length > 0) {
        out += variables[keys[keys.length - 1]] + "\n";
      } else {
        out += "undefined\n";
      }
      return;
    }

    // literal print
    if (token.startsWith(">>>")) {
      const val = token.replace(/>/g, "").replace(/\./g, "");
      out += val.length + "\n";
      return;
    }

    errorLines.push(i);
  });

  if (out === "") {
    out = "Error: No output produced";
  }

  output.innerHTML = out.split("\n").map(l => `<div>${l}</div>`).join("");
  highlight.innerHTML = syntaxHighlight(code, errorLines);
}

editor.addEventListener("input", () => {
  run(editor.value);
});

// initial
editor.value = ">-= >>>... >->";
run(editor.value);
</script>

</body>
</html>
