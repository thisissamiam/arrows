<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Custom Language IDE (Real Engine)</title>
<style>
body{margin:0;font-family:monospace;background:#1e1e1e;color:#ccc;display:flex;flex-direction:column;height:100vh}
#topbar{height:40px;background:#2d2d2d;display:flex;align-items:center;padding:0 10px;gap:10px}
button{background:#3a3a3a;border:none;color:#fff;padding:5px 10px;cursor:pointer}
#main{display:flex;flex:1}
#editor{width:65%}
#right{width:35%;display:flex;flex-direction:column;background:#1b1b1b}
#output{flex:1;padding:10px;color:#00ff88;white-space:pre-wrap}
</style>
</head>
<body>

<div id="topbar">
<button onclick="runCode()">▶ Run</button>
</div>

<div id="main">
<div id="editor"></div>
<div id="right">
<div style="padding:8px;background:#2d2d2d">Output</div>
<div id="output"></div>
</div>
</div>

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script src="https://unpkg.com/nearley@2.20.1/lib/nearley.js"></script>
<script src="https://unpkg.com/nearley@2.20.1/lib/compile.js"></script>
<script src="https://unpkg.com/nearley@2.20.1/lib/generate.js"></script>
<script src="https://unpkg.com/nearley@2.20.1/lib/nearley-language-bootstrapped.js"></script>

<script>
let editor;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: ">>>[>.]",
    language: 'plaintext',
    theme: 'vs-dark',
    automaticLayout: true,
    minimap: { enabled: false }
  });
});

// ===== GRAMMAR =====
const grammarSource = `
main -> statement:+ {% d => d[0] %}

statement -> loop | assign | varPrint | print

loop -> arrows "[" statement:+ "]" {% d => ({type:'loop',count:d[0],body:d[2]}) %}
assign -> arrows "-=>" value {% d => ({type:'assign',varIndex:d[0],value:d[2]}) %}
varPrint -> arrows "->" {% d => ({type:'varPrint',varIndex:d[0]}) %}
print -> arrows dots {% d => ({type:'print',arrows:d[0],dots:d[1]}) %}

arrows -> ">" arrows {% d => d[1]+1 %} | ">" {% () => 1 %}
dots -> "." dots {% d => d[1]+1 %} | "." {% () => 1 %}
value -> dots {% d => d[0] %}
`;

// Compile grammar
const parserGrammar = nearley.Grammar.fromCompiled((() => {
  const parser = new nearley.Parser(nearley.Grammar.fromCompiled(nearleyLanguage));
  parser.feed(grammarSource);
  const compilation = compile(parser.results[0], {});
  const js = generate(compilation, "grammar");
  return eval(js);
})());

// ===== EXECUTION =====
function execute(ast, vars, out){
  for(const node of ast){
    if(node.type==='print'){
      if(node.dots===1) out.value += String.fromCharCode(96+node.arrows);
      else if(node.dots===2) out.value += String.fromCharCode(64+node.arrows);
      else if(node.dots===3) out.value += String(node.arrows);
      else if(node.dots===4) out.value += "@";
      else out.value += "?";
    }

    else if(node.type==='assign'){
      vars[node.varIndex] = node.value;
    }

    else if(node.type==='varPrint'){
      out.value += (vars[node.varIndex]||0);
    }

    else if(node.type==='loop'){
      for(let i=0;i<node.count;i++){
        execute(node.body,vars,out);
      }
    }
  }
}

// ===== RUN =====
function runCode(){
  try{
    const input = editor.getValue();
    const parser = new nearley.Parser(parserGrammar);
    parser.feed(input);

    const ast = parser.results[0];

    let vars = {};
    let out = {value:""};

    execute(ast,vars,out);

    document.getElementById("output").textContent = out.value;
  }catch(e){
    document.getElementById("output").textContent = "Error: "+e.message;
  }
}
</script>

</body>
</html>
