<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Custom Language Editor (Final Parser)</title>
  <style>
    body { margin: 0; font-family: monospace; background: #1e1e1e; color: #fff; }
    #container { display: flex; flex-direction: column; height: 100vh; }
    #editor { height: 60%; }
    #controls { padding: 10px; background: #111; }
    button { padding: 8px 12px; margin-right: 10px; }
    #output { height: 40%; background: #000; color: #0f0; padding: 10px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="container">
  <div id="editor"></div>
  <div id="controls">
    <button onclick="runCode()">Run</button>
  </div>
  <pre id="output"></pre>
</div>

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
let editor;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: "",
    language: 'plaintext',
    theme: 'vs-dark',
    automaticLayout: true
  });
});

// ===== TOKENIZER =====
function tokenize(input) {
  let tokens = [];
  let i = 0;

  while (i < input.length) {
    if (input[i] === '>') {
      let start = i;
      while (i < input.length && input[i] === '>') i++;

      let rest = '';
      while (i < input.length && input[i] !== ' ' && input[i] !== '\n') {
        if (input[i] === '[' || input[i] === ']') break;
        rest += input[i++];
      }

      tokens.push(input.slice(start, start + (i - start) + rest.length));
    } else if (input[i] === '[') {
      let start = i;
      let depth = 1;
      i++;
      while (i < input.length && depth > 0) {
        if (input[i] === '[') depth++;
        if (input[i] === ']') depth--;
        i++;
      }
      tokens.push(input.slice(start, i));
    } else {
      i++;
    }
  }

  return tokens;
}

function countArrows(str) {
  let i = 0;
  while (i < str.length && str[i] === '>') i++;
  return i;
}

// ===== PARSER =====
function parseBlock(block) {
  let tokens = tokenize(block);
  return tokens.map(parseStatement);
}

function parseStatement(token) {
  if (token.includes('[')) {
    let arrows = countArrows(token);
    let inner = token.slice(token.indexOf('[') + 1, token.lastIndexOf(']'));
    return {
      type: 'loop',
      count: arrows,
      body: parseBlock(inner)
    };
  }

  if (token.includes('-=>')) {
    let [left, right] = token.split('-=>');
    return {
      type: 'assign',
      varIndex: countArrows(left),
      valueToken: right
    };
  }

  if (token.includes('->')) {
    return {
      type: 'varPrint',
      varIndex: countArrows(token.split('->')[0])
    };
  }

  if (token.startsWith('>')) {
    return {
      type: 'print',
      arrows: countArrows(token),
      dots: token.slice(countArrows(token))
    };
  }

  return { type: 'noop' };
}

// ===== EXECUTION =====
function execute(ast, variables, out) {

  function parseValue(token) {
    let arrows = 0;
    while (arrows < token.length && token[arrows] === '>') arrows++;

    let dots = token.slice(arrows);

    // If numeric mode (...), use arrow count as value
    if (dots === '...') return arrows;

    // fallback: dot length
    return dots.length || 0;
  }

  for (let node of ast) {

    if (node.type === 'print') {
      let dots = node.dots;
      let arrows = node.arrows;

      if (dots === '.') out.value += 'a';
      else if (dots === '..') out.value += 'A';
      else if (dots === '...') out.value += String(arrows);
      else if (dots === '....') out.value += '@';
      else out.value += '?';
    }

    else if (node.type === 'assign') {
      variables[node.varIndex] = parseValue(node.valueToken);
    }

    else if (node.type === 'varPrint') {
      out.value += (variables[node.varIndex] || 0);
    }

    else if (node.type === 'loop') {
      for (let i = 0; i < node.count; i++) {
        execute(node.body, variables, out);
      }
    }
  }
}

// ===== RUN =====
function runCode() {
  const input = editor.getValue();
  let ast = parseBlock(input);

  let variables = {};
  let out = { value: '' };

  execute(ast, variables, out);

  document.getElementById('output').textContent = out.value;
}
</script>

</body>
</html>
