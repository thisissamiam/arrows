<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compiler</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 150px;
    background: #222;
    color: #0f0;
    border: 1px solid #444;
    padding: 10px;
    font-family: monospace;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
  }

  #output {
    margin-top: 20px;
    background: #000;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    font-family: monospace;
    border: 1px solid #444;
    white-space: pre-wrap;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
  }
</style>
</head>

<body>

<h2>Compiler</h2>

<textarea id="codeInput" placeholder="Enter code..."></textarea>
<br>
<button onclick="runCode()">Run</button>

<div id="status">Loading...</div>
<div id="output"></div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers";

const outputDiv = document.getElementById("output");
const statusDiv = document.getElementById("status");
const inputBox = document.getElementById("codeInput");

let translator;

function log(text) {
  outputDiv.textContent += text + "\n";
}

// Load a smaller, faster model
async function loadModel() {
  statusDiv.textContent = "Loading model...";

  translator = await pipeline(
    "text2text-generation",
    "Xenova/flan-t5-small"
  );

  statusDiv.textContent = "Ready";
}

// Clean AI output so only valid JS remains
function extractJS(text) {
  // Remove markdown fences if any
  text = text.replace(/```[a-z]*|```/gi, "");

  // Try to isolate code by common JS keywords
  const start = text.search(/(let|const|var|function|console\.log)/);
  if (start !== -1) {
    text = text.slice(start);
  }

  // Stop at likely explanation text
  text = text.split("\n\n")[0];
  text = text.split("Explanation")[0];
  text = text.split("Here is")[0];

  return text.trim();
}

// Translate input → JS
async function translate(code) {
  const prompt = `
Convert this into JavaScript ONLY.

Rules:
- Output only valid JavaScript
- No explanations
- No extra text

Input:
${code}
`;

  const result = await translator(prompt, {
    max_new_tokens: 80,
  });

  let text = result[0].generated_text;

  return extractJS(text);
}

// Run compiler
window.runCode = async function () {
  outputDiv.textContent = "";

  const code = inputBox.value;

  if (!translator) {
    log("Still loading...");
    return;
  }

  statusDiv.textContent = "Translating...";

  try {
    const jsCode = await translate(code);

    log("Generated JS:\n" + jsCode + "\n");
    log("Running...\n");

    const originalLog = console.log;

    console.log = (...args) => {
      log(args.join(" "));
    };

    eval(jsCode);

    console.log = originalLog;

    statusDiv.textContent = "Done";
  } catch (err) {
    log("Error: " + err);
    statusDiv.textContent = "Error";
  }
};

loadModel();
</script>

</body>
</html>
